<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Bao Bao ツ</title>

<!-- favicon icon -->

<link rel="icon" href="icon.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:Arial, sans-serif;
background:#000;
color:white;
overflow-x:hidden;
}

/* PARTICLE BACKGROUND */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* HEADER BAR */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.8);
z-index:1000;
}

/* LOGO */

.logo{
color:#6fb3ff;
font-size:22px;
letter-spacing:3px;
font-weight:bold;
}

/* MENU BUTTON */

.menu-btn{
font-size:28px;
cursor:pointer;
color:#6fb3ff;
}

/* SIDE MENU */

.menu{
position:fixed;
top:0;
right:-300px;
width:300px;
height:100vh;
background:black;
padding-top:120px;
transition:0.4s;
text-align:center;
}

.menu a{
display:block;
margin:30px;
font-size:22px;
text-decoration:none;
color:#6fb3ff;
letter-spacing:3px;
}

.menu a:hover{
color:#a8d0ff;
}

/* HERO */

header{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

header h1{
font-size:70px;
color:#6fb3ff;
text-shadow:0 0 20px #1e90ff;
}

/* SECTION */

section{
padding:120px 20px;
text-align:center;
max-width:900px;
margin:auto;
}

h2{
color:#6fb3ff;
letter-spacing:4px;
margin-bottom:30px;
}

/* VIDEO */

.videos{
display:flex;
flex-wrap:wrap;
gap:30px;
justify-content:center;
}

iframe{
width:360px;
height:200px;
border:none;
border-radius:10px;
}

/* PHOTOS */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
}

/* SOCIAL */

.social a{
display:block;
margin:12px;
text-decoration:none;
color:#6fb3ff;
font-size:18px;
}

.social a:hover{
color:#a8d0ff;
}

/* FOOTER */

footer{
padding:40px;
text-align:center;
color:#555;
}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<!-- HEADER -->

<div class="topbar">

<div class="logo">Bao Bao ツ</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

</div>

<!-- MENU -->

<div class="menu" id="menu">

<a href="#about">BIOGRAPHY</a> <a href="#music">MUSIC</a> <a href="#photos">PHOTOS</a> <a href="#social">SOCIAL</a>

</div>

<!-- MUSIC -->

<h2>MUSIC I LIKE</h2>

<div class="videos">

<div class="gallery">

<img src="photo1.jpg">

</section>

<!-- SOCIAL -->

<section id="social">

<h2>SOCIAL</h2>

<div class="social">

<a href="https://www.facebook.com/nho.bao.9484941">Facebook</a> <a href="https://www.instagram.com/baobaonenye/">Instagram</a> <a href="https://www.threads.com/@baobaonenye">Threads</a> <a href="https://youtube.com/@baobaone661">YouTube</a>

<footer>

</footer>

<script>

/* MENU */

function toggleMenu(){

let menu = document.getElementById("menu")

if(menu.style.right == "0px"){
menu.style.right = "-300px"
}else{
menu.style.right = "0px"
}

}

/* STAR BACKGROUND */

const canvas = document.getElementById("stars")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let stars = []

for(let i=0;i<120;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.3

})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(star=>{

star.y+=star.speed

if(star.y>canvas.height){
star.y=0
}

ctx.beginPath()
ctx.arc(star.x,star.y,star.size,0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
