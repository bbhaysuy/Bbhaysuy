<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Bao Bao ツ</title>

<link rel="icon" href="icon.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:Arial, sans-serif;
background:#000;
color:white;
overflow-x:hidden;
}

/* LOADING SCREEN */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#loader h1{
color:#6fb3ff;
font-size:60px;
letter-spacing:6px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:0.3;}
50%{opacity:1;}
100%{opacity:0.3;}
}

/* PARTICLES */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* CURSOR */

.cursor{
position:fixed;
width:15px;
height:15px;
background:#6fb3ff;
border-radius:50%;
pointer-events:none;
box-shadow:0 0 20px #1e90ff;
transform:translate(-50%,-50%);
z-index:999;
}

/* HEADER */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.85);
z-index:1000;
}

/* LOGO */

.logo{
color:#6fb3ff;
font-size:22px;
letter-spacing:3px;
font-weight:bold;
}

/* MENU BUTTON */

.menu-btn{
font-size:28px;
cursor:pointer;
color:#6fb3ff;
}

/* SIDE MENU */

.menu{
position:fixed;
top:0;
right:-300px;
width:300px;
height:100vh;
background:black;
padding-top:120px;
transition:0.4s;
text-align:center;
}

.menu a{
display:block;
margin:30px;
font-size:22px;
text-decoration:none;
color:#6fb3ff;
letter-spacing:3px;
}

.menu a:hover{
color:#a8d0ff;
}

/* HERO */

header{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

header h1{
font-size:70px;
color:#6fb3ff;
text-shadow:0 0 20px #1e90ff;
}

/* SECTIONS */

section{
padding:120px 20px;
text-align:center;
max-width:900px;
margin:auto;
}

h2{
color:#6fb3ff;
letter-spacing:4px;
margin-bottom:30px;
}

/* VIDEOS */

.videos{
display:flex;
flex-wrap:wrap;
gap:30px;
justify-content:center;
}

iframe{
width:360px;
height:200px;
border:none;
border-radius:10px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
transition:0.5s;
filter:brightness(80%);
}

.gallery img:hover{
transform:scale(1.08);
filter:brightness(100%);
box-shadow:0 0 30px #1e90ff;
}

/* SOCIAL */

.social a{
display:block;
margin:12px;
text-decoration:none;
color:#6fb3ff;
font-size:18px;
}

.social a:hover{
color:#a8d0ff;
}

/* FOOTER */

footer{
padding:40px;
text-align:center;
color:#555;
}

</style>

</head>

<body>

<div id="loader">
<h1>Bao Bao ツ</h1>
</div>

<canvas id="stars"></canvas>

<div class="cursor"></div>

<!-- HEADER -->

<div class="topbar">

<div class="logo">Bao Bao ツ</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

</div>

<!-- MENU -->

<div class="menu" id="menu">

<a href="#about">□</a> <a href="#music">MUSIC</a> <a href="#photos">PHOTOS</a> <a href="#social">SOCIAL</a>

</div>

<!-- HERO -->

<header>

<h1>Bao Bao ツ</h1>

</header>

<!-- BIO -->

<section id="about">

<h2>□</h2>

<p>Người hài hước tim đầy vết xước.</p>

</section>

<!-- MUSIC -->

<section id="music">

<h2>MUSIC I LIKE</h2>

<div class="videos">

<iframe src="https://www.youtube.com/embed/videoseries?list=PLGb8ItTdj4C3BhiTtyLT0c3xaRGQVIfeB"></iframe>

<iframe src="https://www.youtube.com/embed/videoseries?list=PLGb8ItTdj4C0-lJJJAgXZO_H9Or7RRJ7r"></iframe>

</div>

</section>

<!-- PHOTOS -->

<section id="photos">

<h2>PHOTOS</h2>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">

</div>

</section>

<!-- SOCIAL -->

<section id="social">

<h2>SOCIAL</h2>

<div class="social">

<a href="https://www.facebook.com/nho.bao.9484941">Facebook</a> <a href="https://www.instagram.com/baobaonenye/">Instagram</a> <a href="https://www.threads.com/@baobaonenye">Threads</a> <a href="https://youtube.com/@baobaone661">YouTube</a>

</div>

</section>

<footer>

© Bao Bao ツ

</footer>

<script>

/* LOADER */

window.addEventListener("load",function(){
setTimeout(()=>{
document.getElementById("loader").style.display="none"
},1500)
})

/* MENU */

function toggleMenu(){

let menu=document.getElementById("menu")

if(menu.style.right=="0px"){
menu.style.right="-300px"
}else{
menu.style.right="0px"
}

}

/* CURSOR */

const cursor=document.querySelector(".cursor")

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

/* PARTICLES */

const canvas=document.getElementById("stars")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<160;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.2
})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

particles.forEach(p=>{

p.y+=p.speed

if(p.y>canvas.height){
p.y=0
}

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
